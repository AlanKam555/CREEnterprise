services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cre-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=sqlite:///./cre.db
      - SECRET_KEY=cre-enterprise-secret-2026
    restart: unless-stopped

  frontend:
    image: node:18-alpine
    container_name: cre-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - NODE_ENV=development
    restart: unless-stopped
