events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── LOGGING ──────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── PERFORMANCE ─────────────────────────────────────
    sendfile           on;
    tcp_nopush        on;
    tcp_nodelay       on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain text/css text/xml application/json application/javascript
        application/xml application/xml+rss text/javascript
        application/x-javascript image/svg+xml;

    # ── RATE LIMITING ───────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10;

    # ── UPSTREAM BACKENDS ───────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:80;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # ── SECURITY HEADERS ─────────────────────────────
        add_header X-Frame-Options        "SAMEORIGIN"              always;
        add_header X-Content-Type-Options "nosniff"                 always;
        add_header X-XSS-Protection      "1; mode=block"           always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy     "camera=(), mic=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── HSTS (uncomment after setting up HTTPS) ───
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── CORS Preflight ──────────────────────────────
        location /api/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'  "$http_origin" always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With, X-Request-ID' always;
                add_header 'Access-Control-Max-Age'       '86400' always;
                add_header 'Content-Type'                 'text/plain charset=UTF-8' always;
                add_header 'Content-Length'               '0' always;
                return 204;
            }
        }

        # ── API REVERSE PROXY ─────────────────────────
        location /api/ {
            limit_req  zone=api burst=50 nodelay;
            limit_conn addr 20;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID $http_x_request_id;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_buffering off;

            # For large file uploads (OCR, PDFs)
            client_max_body_size 25M;
        }

        # ── STATIC FILES (Frontend) ────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ── FRONTEND SPA ───────────────────────────────
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;

            # Security
            add_header X-Frame-Options "SAMEORIGIN" always;

            # Cache HTML (but allow SW to update)
            location = /index.html {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }
        }

        # ── HEALTH CHECK ───────────────────────────────
        location /health.html {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # ── METRICS (for Prometheus) ───────────────────
        location /metrics {
            auth_basic "Metrics";
            auth_basic_user_file /etc/nginx/.htpasswd;
            return 200 'nginx_http_requests_total 0\n';
        }

        # ── ERROR PAGES ────────────────────────────────
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            add_header Content-Type text/plain;
        }
    }
}
